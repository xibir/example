server {
    listen  80;

    server_name example.test;
    root /var/www/html/public;
    set $fmp_root /var/www/html/public;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    gzip on;
    gzip_min_length 1000;
    gzip_proxied any;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Scheme $scheme;
    proxy_set_header Host $http_host;

    location ~* ^/uploads {
        root /var/www/html/public/;
        access_log off;
        expires 3d;
    }

    location / {
         if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'PUT, GET, POST, DELETE, OPTIONS, PATCH';
            add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Accept, Protection-Phrase, Protection-Signature, Content-Type, api_key, Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
         }

         try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass localhost:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        # When you are using symlinks to link the document root to the
        # current version of your application, you should pass the real
        # application path instead of the path to the symlink to PHP
        # FPM.
        # Otherwise, PHP's OPcache may not properly detect changes to
        # your PHP files (see https://github.com/zendtech/ZendOptimizerPlus/issues/126
        # for more information).
        fastcgi_param SCRIPT_FILENAME $fmp_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $fmp_root;
        fastcgi_param HTTP_CF_COUNTRY $http_cf_ipcountry;

        internal;
    }

    error_log /dev/stdout;
    access_log /dev/stdout;
}
